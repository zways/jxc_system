# ============================================================
#  进销存系统 Docker Compose 配置
#
#  用法：
#    开发环境：docker compose up -d
#    生产环境：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ── 应用服务 ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jxc-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: "${APP_NAME:-进销存系统}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      APP_TIMEZONE: Asia/Shanghai

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jxc_system}"
      DB_USERNAME: "${DB_USERNAME:-jxc_user}"
      DB_PASSWORD: "${DB_PASSWORD:-jxc_password}"

      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

      # 使用独立 queue 服务时，本容器内不运行队列与定时任务
      RUN_QUEUE_IN_CONTAINER: "false"
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jxc-network

  # ── 队列 Worker（处理异步任务如审计日志）──────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jxc-queue
    restart: unless-stopped
    environment:
      APP_NAME: "${APP_NAME:-进销存系统}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:8080}"

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jxc_system}"
      DB_USERNAME: "${DB_USERNAME:-jxc_user}"
      DB_PASSWORD: "${DB_PASSWORD:-jxc_password}"

      CACHE_STORE: redis
      QUEUE_CONNECTION: redis

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"

      RUN_MIGRATIONS: "false"
    volumes:
      - app-logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jxc-network
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]

  # ── MySQL 数据库 ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: jxc-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-jxc_system}"
      MYSQL_USER: "${DB_USERNAME:-jxc_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-jxc_password}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_password}"
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      # 使用容器内 MYSQL_ROOT_PASSWORD，避免 compose 变量在 test 里展开异常
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - jxc-network

  # ── Redis 缓存 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jxc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jxc-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local
  app-logs:
    driver: local

networks:
  jxc-network:
    driver: bridge
